<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiah Banerjee</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/kuf7grk.css">
</head>
<body>
    <div class="lines"></div>
    <div class="intro">
        <span class="name">Kiah Banerjee</span>
        <div class="roles">
            <span class="role role-1">Graphic Design</span>
            <span class="role role-2">Creative Direction</span>
        </div>
    </div>

    <nav class="main-nav">
        <span>Kiah Banerjee</span>
        <span>Archive</span>
        <span>Overview</span>
        <span>Contact</span>
        <span>CV</span>
    </nav>

    <div class="home">
        <section class="project-section">
            <img src="edible streets 1.jpg" class="featured-img" alt="Edible Streets">
            <div class="featured-info">
                <p class="project-title">Edible Streets</p>
                <p class="project-type">Book Design</p>
            </div>
        </section>
        <section class="project-section">
            <video class="featured-video" autoplay muted loop playsinline>
                <source src="nyc street musicians.mp4" type="video/mp4">
            </video>
            <div class="featured-info">
                <p class="project-title">NYC Street Musicians</p>
                <p class="project-type">Publication</p>
            </div>
        </section>
        <section class="project-section">
            <video class="featured-video" autoplay muted loop playsinline>
                <source src="book of sand 1.mp4" type="video/mp4">
            </video>
            <div class="featured-info">
                <p class="project-title">The Book of Sand</p>
                <p class="project-type">Creative Coding & Interaction Design</p>
            </div>
        </section>
    </div>

    <script>
        const container = document.querySelector('.lines');
        const spacing   = 14;
        const startX    = 28;
        const endX      = document.querySelector('.roles').getBoundingClientRect().right + 8;
        const count     = Math.floor((endX - startX) / spacing) + 1;

        for (let i = 0; i < count; i++) {
            const line = document.createElement('div');
            line.className = 'vline';
            line.style.left = (startX + i * spacing) + 'px';
            line.style.animationDelay = (1.4 + i * 0.015) + 's';
            container.appendChild(line);
        }

        const lastLineEnd = (1.4 + (count - 1) * 0.015 + 0.25) * 1000;
        const exitStart   = lastLineEnd + 150;
        const homeDelay   = exitStart + 1000 + 400;

        setTimeout(() => {
            document.querySelector('.intro').classList.add('exit');
            document.querySelector('.lines').classList.add('exit');
        }, exitStart);

        setTimeout(() => {
            document.querySelector('.main-nav').classList.add('visible');
        }, homeDelay);

        setTimeout(() => {
            document.querySelector('.featured-img').classList.add('visible');
            document.querySelector('.project-section:first-child .featured-info').classList.add('visible');
        }, homeDelay + 200);

        // Trigger each scroll section when snapped into view
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const video = entry.target.querySelector('.featured-video');
                    const info  = entry.target.querySelector('.featured-info');
                    video.style.transition = 'none';
                    info.style.transition  = 'none';
                    video.classList.add('visible');
                    info.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.project-section:not(:first-child)').forEach(s => observer.observe(s));
    </script>
</body>
</html>
